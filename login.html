<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PaxStudio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="index.html"><h1>PaxStudio</h1></a>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Registrar</button>
            </div>

            <!-- Login Form -->
            <div id="login" class="tab-content active">
                <h2>Bem-vindo de Volta</h2>
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                    <p class="form-footer">Não tem conta? <a href="#" class="tab-link" data-tab="register">Registre-se</a></p>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register" class="tab-content">
                <h2>Criar Conta</h2>
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="registerName">Nome Completo</label>
                        <input type="text" id="registerName" name="name" required placeholder="Seu Nome">
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" name="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Senha</label>
                        <input type="password" id="registerPassword" name="password" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="registerPasswordConfirm">Confirmar Senha</label>
                        <input type="password" id="registerPasswordConfirm" name="passwordConfirm" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Registrar</button>
                    <p class="form-footer">Já tem conta? <a href="#" class="tab-link" data-tab="login">Faça Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/auth.js"></script>
</body>
</html>
